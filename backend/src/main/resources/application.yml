spring:
  profiles:
    active: dev
  application:
    name: school-erp-backend

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 20
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/google"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:SchoolERPSuperSecretKeyThatIsAtLeast512BitsLongForHS512Algorithm2026}
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081,exp://localhost:8081}
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  oauth2:
    authorized-redirect-uris:
      - http://localhost:8081/auth/callback
      - exp://localhost:8081/auth/callback
      - schoolerp://auth/callback
